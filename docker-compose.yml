services:
  project-wizard:
    build:
      context: .
      args:
        BUILD_VERSION: "${BUILD_VERSION:-dev}"   # set by scripts/update.sh (git short SHA)
    # If you publish an image instead of building on the server, swap `build` for:
    #   image: ghcr.io/<owner>/project-wizard:latest
    container_name: project-wizard
    restart: unless-stopped
    ports:
      - "4500:4500"          # host:container — reach it at http://<server-ip>:4500
    environment:
      - PORT=4500
      # Optional: a server-side key enables "reverse-engineer with AI" without
      # entering one in the GUI each time. Leave unset to require the GUI field.
      # The wizard never writes a key to disk; a GUI-entered key is used per-request.
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # Optional but recommended once you have a real hostname: the wizard's
      # public URL (e.g. https://projects.example.com). Baked into deployed pods
      # as WIZARD_URL — powers each pod's "← App" link and Update-app callback.
      # Set it in an untracked .env next to this file so updates never lose it.
      - WIZARD_PUBLIC_URL=${WIZARD_PUBLIC_URL:-}
      # ── Microsoft Entra ID (Azure AD) SSO ──────────────────────────────────
      # Set AUTH_MODE=entra (+ the ENTRA_* below) to gate the wizard AND every
      # pod it deploys behind corporate sign-in. Unset = open (unchanged). One
      # Azure app registration per org serves the wizard + all its pods (each a
      # registered redirect URI). Reproduce for another domain by standing up a
      # second install with that org's tenant/client/secret. Keep these in the
      # untracked .env so scripts/update.sh never discards them.
      - AUTH_MODE=${AUTH_MODE:-off}
      - ENTRA_TENANT_ID=${ENTRA_TENANT_ID:-}
      - ENTRA_CLIENT_ID=${ENTRA_CLIENT_ID:-}
      - ENTRA_CLIENT_SECRET=${ENTRA_CLIENT_SECRET:-}
      - ENTRA_ALLOWED=${ENTRA_ALLOWED:-}          # comma list of emails or @domains
      - AUTH_PUBLIC_URL=${AUTH_PUBLIC_URL:-}       # the wizard's own https origin (Azure redirect base)
      - AUTH_SESSION_HOURS=${AUTH_SESSION_HOURS:-12}
      # ── Entra directory lookup (wizard Stakeholders step) ──────────────────
      # Optional SECOND app registration used only for Microsoft Graph people
      # search (User.Read.All application permission). Keeping it separate means
      # the SSO secret baked into pods can't read the directory. Unset = the
      # lookup falls back to the ENTRA_* SSO creds (grant that app the
      # permission instead). Wizard-only: never forwarded to pods.
      - GRAPH_TENANT_ID=${GRAPH_TENANT_ID:-}
      - GRAPH_CLIENT_ID=${GRAPH_CLIENT_ID:-}
      - GRAPH_CLIENT_SECRET=${GRAPH_CLIENT_SECRET:-}
    volumes:
      - project-wizard-data:/app/data   # projects + generated trees persist here
      # Key-based "Deploy now" (for key-only SSH servers): mounts the host user's
      # SSH dir so the container can authenticate with their key when no password
      # is given. Read-only; harmless when deploying with a password instead.
      - ${HOME:-/root}/.ssh:/root/.ssh:ro

volumes:
  project-wizard-data:
