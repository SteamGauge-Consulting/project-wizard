services:
  project-wizard:
    build: .
    # If you publish an image instead of building on the server, swap `build` for:
    #   image: ghcr.io/<owner>/project-wizard:latest
    container_name: project-wizard
    restart: unless-stopped
    ports:
      - "4500:4500"          # host:container — reach it at http://<server-ip>:4500
    environment:
      - PORT=4500
      # Optional: a server-side key enables "reverse-engineer with AI" without
      # entering one in the GUI each time. Leave unset to require the GUI field.
      # The wizard never writes a key to disk; a GUI-entered key is used per-request.
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - project-wizard-data:/app/data   # projects + generated trees persist here
      # Key-based "Deploy now" (for key-only SSH servers): mounts the host user's
      # SSH dir so the container can authenticate with their key when no password
      # is given. Read-only; harmless when deploying with a password instead.
      - ${HOME:-/root}/.ssh:/root/.ssh:ro

volumes:
  project-wizard-data:
